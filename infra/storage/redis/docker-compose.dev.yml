services:
  redis:
    image: redis:7-alpine
    container_name: redis-dev
    restart: always
    command:
      - "redis-server"
      - "--appendonly"
      - "yes"
      - "--maxmemory"
      - "256mb"
      - "--maxmemory-policy"
      - "allkeys-lru"
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - app-internal

volumes:
  redis_data:

networks:
  app-internal:
    name: app-internal
    external: true
