services:
  s3:
    image: minio/minio:latest
    container_name: minio
    restart: always
    env_file:
      - ../../../.env.dev
    # Dev: keep host publish for MinIO console / S3 client. Prod has only `expose:`.
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    volumes:
      - s3_data:/data
    command: server /data --console-address ":9001"
    networks:
      - app-internal

volumes:
  s3_data:

networks:
  app-internal:
    name: app-internal
    external: true
