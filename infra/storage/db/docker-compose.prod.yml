services:
  db:
    image: postgres:16-alpine
    container_name: postgres-db
    restart: always
    env_file:
      - ../../../.env.prod
    expose:
      - "5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - app-internal

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file:
      - ../../../.env.prod
    depends_on:
      - db
    networks:
      - app-internal
    volumes:
      - ./alembic/versions:/app/alembic/versions

volumes:
  db_data:

networks:
  app-internal:
    name: app-internal
    external: true
